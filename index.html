/* ── Match-Algorithmus ──────────────────────────────── */
function calcMatch(entry,size,fl,fw){
  const inL=fl>=size.lMin&&fl<=size.lMax;
  const nearL=!inL&&fl>=size.lMin-5&&fl<=size.lMax+5;
  if(!inL&&!nearL)return null;
  const lMid=(size.lMin+size.lMax)/2,lHalf=(size.lMax-size.lMin)/2;
  const lScore=inL?100-Math.round(Math.abs(fl-lMid)/lHalf*28):40;
  const lPos=(fl-size.lMin)/(size.lMax-size.lMin); // 0..1 position within range

  if(!fw||size.wMin==null)return{score:lScore,lSt:inL?"ok":"border",wSt:"none",lPos};
  const inW=fw>=size.wMin&&fw<=size.wMax;
  const nearW=!inW&&fw>=size.wMin-3&&fw<=size.wMax+3;
  if(!inW&&!nearW)return null;
  const wMid=(size.wMin+size.wMax)/2,wHalf=(size.wMax-size.wMin)/2;
  const wScore=inW?100-Math.round(Math.abs(fw-wMid)/wHalf*28):40;
  return{score:Math.round((lScore+wScore)/2),lSt:inL?"ok":"border",wSt:inW?"ok":"border",lPos};
}

function findMatches(db,m){
  const fl=parseFloat(m.footLength);
  if(!fl||fl<180||fl>360)return[];
  const fw=parseFloat(m.footWidth)||null;
  return db.flatMap(e=>e.sizes.map(sz=>{
    const r=calcMatch(e,sz,fl,fw);
    return r?{...r,entry:e,size:sz}:null;
  }).filter(Boolean)).sort((a,b)=>b.score-a.score);
}

      <div style={{fontSize:13,color:C.mut,lineHeight:1.6}}>

      </div>
    </div>

    <Input label="Fußlänge" unit="mm" hint="Pflichtfeld" type="number" placeholder="z.B. 272" value={m.footLength} onChange={e=>setM({...m,footLength:e.target.value})}/>
    <Input label="Fußbreite" unit="mm" hint="Pflichtfeld" type="number" placeholder="z.B. 92" value={m.footWidth} onChange={e=>setM({...m,footWidth:e.target.value})}/>
    <Input label="Ballenabstand" unit="mm" hint="optional – Ferse bis Großzehengrundgelenk" type="number" placeholder="z.B. 195" value={m.archLength} onChange={e=>setM({...m,archLength:e.target.value})}/>

    {cleatOffset!==null&&<div style={{marginBottom:18,padding:12,background:C.blueBg,border:`1px solid #1e3a5f`,borderRadius:8,fontSize:12,color:C.blue}}>
      <strong>Cleat-Hinweis:</strong> Differenz Fußlänge−Ballenabstand = <span className="mono" style={{fontWeight:700}}>{cleatOffset} mm</span>. Bei positiver Differenz ({'>'}0) Cleat leicht Richtung Ferse verschieben, um den Ball über dem Pedal zu zentrieren.
    </div>}

    <SegPicker label="Spannhöhe / Fußvolumen" value={m.instep} onChange={v=>setM({...m,instep:v})}
      options={[{v:"low",l:"Niedrig"},{v:"normal",l:"Normal"},{v:"hoch",l:"Hoch"}]}/>
    <SegPicker label="Fersenform" value={m.heel} onChange={v=>setM({...m,heel:v})}
      options={[{v:"narrow",l:"Schmal"},{v:"normal",l:"Normal"},{v:"wide",l:"Weit"}]}/>

    {m.instep==="hoch"&&<div style={{marginBottom:18,padding:12,background:"#1c1310",border:`1px solid ${C.orange}`,borderRadius:8,fontSize:12,color:C.orange,lineHeight:1.5}}>

    </div>}
    {m.heel==="narrow"&&<div style={{marginBottom:18,padding:12,background:C.blueBg,border:`1px solid #1e3a5f`,borderRadius:8,fontSize:12,color:C.blue,lineHeight:1.5}}>

    </div>}

          <div style={{fontSize:11,color:C.dim,marginBottom:6,fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase"}}>Position im Längenbereich</div>
          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:2}}>
            <Dot st={lSt}/>
            <span className="mono" style={{fontSize:13,color:C.mut}}>{s.lMin}–{s.lMax} mm</span>
            {lSt==="border"&&<span style={{fontSize:11,color:C.amber}}>(außerhalb, Grenzwert)</span>}
          </div>
          <PositionGauge lPos={lPos}/>
        </div>

        {hasFw&&<div>
          <div style={{fontSize:11,color:C.dim,marginBottom:4,fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase"}}>Breite</div>
          {s.wMin!=null?<div style={{display:"flex",alignItems:"center",gap:6}}>
            <Dot st={wSt}/>
            <span className="mono" style={{fontSize:13,color:C.mut}}>{s.wMin}–{s.wMax} mm</span>
            {wSt==="border"&&<span style={{fontSize:11,color:C.amber}}>(Grenzwert)</span>}
          </div>:<span style={{fontSize:12,color:C.dim}}>Keine Breitendaten verfügbar</span>}
        </div>}

        {e.notes&&<div style={{fontSize:12,color:"#7dd3fc",padding:"9px 12px",background:C.blueBg,borderRadius:7,lineHeight:1.5}}>
          {e.notes}
        </div>}
      </div>
    </div>}
  </div>;
}

function ResultsView({matches,m,allBrands,onBack}){
  const [brandFilter,setBrandFilter]=useState([]);
  const fl=parseFloat(m.footLength);
  const fw=parseFloat(m.footWidth)||null;

  const filtered=brandFilter.length===0?matches:matches.filter(r=>brandFilter.includes(r.entry.brand));

  const toggleBrand=b=>setBrandFilter(f=>f.includes(b)?f.filter(x=>x!==b):[...f,b]);

  if(!fl)return <div style={{padding:40,textAlign:"center",color:C.mut}}>
    <div style={{fontSize:48,marginBottom:12}}>📏</div>
    <p style={{marginBottom:20}}>Noch keine Maße eingegeben.</p>
    <button onClick={onBack} style={{padding:"11px 22px",background:C.amber,color:"#000",border:"none",borderRadius:8,cursor:"pointer",fontWeight:800,fontSize:14}}>Jetzt messen →</button>
  </div>;

  return <div style={{padding:24}}>
    <div style={{marginBottom:16,display:"flex",alignItems:"flex-start",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>
      <div>
        <div style={{display:"flex",gap:16,flexWrap:"wrap",marginBottom:4}}>
          <span><span style={{color:C.dim,fontSize:13}}>Länge: </span><span className="mono" style={{fontWeight:800,color:C.amber}}>{fl} mm</span></span>
          {fw&&<span><span style={{color:C.dim,fontSize:13}}>Breite: </span><span className="mono" style={{fontWeight:800,color:C.amber}}>{fw} mm</span></span>}
          {m.archLength&&<span><span style={{color:C.dim,fontSize:13}}>Ballen: </span><span className="mono" style={{fontWeight:800,color:C.blue}}>{m.archLength} mm</span></span>}
        </div>
        <div style={{fontSize:12,color:C.dim}}>{filtered.length} von {matches.length} Treffern</div>
      </div>
    </div>

    {allBrands.length>1&&<div style={{marginBottom:16,display:"flex",gap:6,flexWrap:"wrap"}}>
      <span style={{fontSize:11,color:C.dim,alignSelf:"center",marginRight:2}}>Marke:</span>
      {allBrands.map(b=>{const sel=brandFilter.includes(b);return <button key={b} onClick={()=>toggleBrand(b)}
        style={{padding:"5px 12px",borderRadius:99,border:`1px solid ${sel?C.amber:C.bord}`,background:sel?C.amberDim:"none",color:sel?C.amber:C.mut,cursor:"pointer",fontSize:12,fontWeight:sel?700:400,transition:"all 0.15s"}}>
        {b}
      </button>;})}
      {brandFilter.length>0&&<button onClick={()=>setBrandFilter([])} style={{padding:"5px 10px",borderRadius:99,border:`1px solid ${C.bord}`,background:"none",color:C.dim,cursor:"pointer",fontSize:12}}>✕ Reset</button>}
    </div>}

    {filtered.length===0?<div style={{padding:32,textAlign:"center",color:C.mut,background:C.s1,borderRadius:10}}>
      Keine Treffer mit diesen Filtern. Maße prüfen oder Filter zurücksetzen.
    </div>:filtered.map((r)=><ResultCard key={r.entry.id+"-"+r.size.eu} r={r} hasFw={!!fw}/>)}

    <div style={{marginTop:20,padding:12,background:C.s1,borderRadius:8,fontSize:11,color:C.dim,lineHeight:1.7}}>
      ⚠ Alle Werte sind Richtwerte auf Basis öffentlicher Herstellerangaben. Hersteller-Daten können abweichen. Vor dem Kauf unbedingt mit der aktuellen offiziellen Größentabelle gegenchecken und – wenn möglich – anprobieren.
    </div>
  </div>;
}

/* ── TAB: Anleitung ──────────────────────────────────── */

    <p style={{color:C.mut,fontSize:14,lineHeight:1.7,marginBottom:24}}>

/* ── TAB: Datenbank ──────────────────────────────────── */
const EMPTY_ENTRY={brand:"",model:"",widthLabel:"Normal",notes:"",heatMoldable:false,
  sizes:[{eu:"40",lMin:250,lMax:257,wMin:84,wMax:93},{eu:"41",lMin:257,lMax:264,wMin:85,wMax:94},{eu:"42",lMin:264,lMax:271,wMin:86,wMax:95},{eu:"43",lMin:271,lMax:278,wMin:87,wMax:96},{eu:"44",lMin:278,lMax:285,wMin:88,wMax:97},{eu:"45",lMin:285,lMax:292,wMin:89,wMax:98}]};

function EntryForm({entry,onSave,onCancel}){
  const [e,setE]=useState({...entry,sizes:entry.sizes.map(s=>({...s}))});
  const setF=(k,v)=>setE(p=>({...p,[k]:v}));
  const setS=(i,k,v)=>{const sz=[...e.sizes];sz[i]={...sz[i],[k]:v===""?null:isNaN(+v)?v:+v};setE(p=>({...p,sizes:sz}));};
  const addRow=()=>setE(p=>({...p,sizes:[...p.sizes,{eu:"",lMin:0,lMax:0,wMin:null,wMax:null}]}));
  const delRow=i=>setE(p=>({...p,sizes:p.sizes.filter((_,j)=>j!==i)}));
  const valid=e.brand&&e.model&&e.sizes.length>0;

  const fieldStyle={width:"100%",background:C.s1,border:`1px solid ${C.bord}`,borderRadius:6,padding:"8px 10px",color:C.txt,fontSize:14,outline:"none",fontFamily:"inherit"};
  const cellStyle={background:C.s1,border:`1px solid ${C.bord}`,borderRadius:4,padding:"5px 7px",color:C.txt,fontSize:12,outline:"none",fontFamily:"monospace",fontVariantNumeric:"tabular-nums"};

  return <div style={{background:C.s2,border:`1px solid ${C.amber}`,borderRadius:12,padding:22,marginBottom:16}}>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
      {[["Marke *","brand",false],["Modell *","model",false],["Weite / Variante","widthLabel",true],["Hinweise","notes",true]].map(([l,k,full])=>
        <div key={k} style={{gridColumn:full?"1/-1":"auto"}}>
          <div style={{fontSize:11,color:C.mut,marginBottom:4,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase"}}>{l}</div>
          <input value={e[k]} onChange={ev=>setF(k,ev.target.value)} style={fieldStyle}/>
        </div>
      )}
      <div style={{gridColumn:"1/-1",display:"flex",alignItems:"center",gap:8}}>
        <input type="checkbox" id="hm2" checked={e.heatMoldable} onChange={ev=>setF("heatMoldable",ev.target.checked)} style={{accentColor:C.amber,width:16,height:16}}/>
        <label htmlFor="hm2" style={{fontSize:13,color:C.mut,cursor:"pointer"}}>Thermoverformbar</label>
      </div>
    </div>

    <div style={{fontSize:11,color:C.mut,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:8}}>Größentabelle <span style={{color:C.dim,fontWeight:400,textTransform:"none",letterSpacing:"normal"}}>(L = Länge mm, B = Breite mm)</span></div>
    <div style={{overflowX:"auto",marginBottom:8}}>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
        <thead>
          <tr>{["EU","L min","L max","B min","B max",""].map(h=><th key={h} style={{padding:"5px 6px",textAlign:"left",color:C.dim,borderBottom:`1px solid ${C.bord}`,fontWeight:700,fontSize:11}}>{h}</th>)}</tr>
        </thead>
        <tbody>
          {e.sizes.map((sz,i)=><tr key={i}>
            {[["eu",36],["lMin",52],["lMax",52],["wMin",52],["wMax",52]].map(([k,w])=>
              <td key={k} style={{padding:"3px 4px"}}>
                <input value={sz[k]??""} onChange={ev=>setS(i,k,ev.target.value)} style={{...cellStyle,width:w}}/>
              </td>
            )}
            <td style={{padding:"3px 4px"}}>
              <button onClick={()=>delRow(i)} style={{background:"none",border:"none",color:C.red,cursor:"pointer",fontSize:15,padding:"3px 7px"}}>✕</button>
            </td>
          </tr>)}
        </tbody>
      </table>
    </div>
    <button onClick={addRow} style={{padding:"6px 14px",background:"none",border:`1px dashed ${C.bord}`,borderRadius:6,color:C.mut,cursor:"pointer",fontSize:12,width:"100%",marginBottom:14}}>+ Zeile hinzufügen</button>

    <div style={{display:"flex",gap:8}}>
      <button onClick={()=>valid&&onSave(e)} style={{flex:1,padding:"11px",background:valid?C.amber:"#334155",color:valid?"#000":C.mut,border:"none",borderRadius:8,cursor:valid?"pointer":"not-allowed",fontWeight:800,fontSize:13}}>Speichern</button>
      <button onClick={onCancel} style={{padding:"11px 18px",background:"none",border:`1px solid ${C.bord}`,color:C.mut,borderRadius:8,cursor:"pointer",fontSize:13}}>Abbrechen</button>
    </div>
  </div>;
}

function DatabaseView({db,setDb}){
  const [adding,setAdding]=useState(false);
  const [editId,setEditId]=useState(null);
  const [search,setSearch]=useState("");
  const nextId=useRef(Math.max(0,...db.map(e=>e.id))+1);
  const fileRef=useRef();

  const save=entry=>{
    if(editId!=null){setDb(db.map(e=>e.id===editId?{...entry,id:editId}:e));setEditId(null);}
    else{setDb([...db,{...entry,id:nextId.current++}]);setAdding(false);}
  };

  const del=id=>{if(window.confirm("Eintrag wirklich löschen?"))setDb(db.filter(e=>e.id!==id));};

  const exportDB=()=>{
    const blob=new Blob([JSON.stringify(db,null,2)],{type:"application/json"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="solefit-datenbank.json";a.click();
  };

  const importDB=ev=>{
    const file=ev.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=e=>{try{const d=JSON.parse(e.target.result);if(Array.isArray(d)){setDb(d);nextId.current=Math.max(0,...d.map(x=>x.id))+1;alert(d.length+" Einträge importiert.");}else alert("Ungültiges Format.");}catch{alert("JSON-Fehler.");}};
    reader.readAsText(file);ev.target.value="";
  };

  const resetDB=()=>{if(window.confirm("Datenbank auf Standard zurücksetzen?"))setDb(DEFAULT_DB);};

  const filtered=search?db.filter(e=>(e.brand+" "+e.model+" "+e.widthLabel).toLowerCase().includes(search.toLowerCase())):db;

  return <div style={{padding:24}}>
    <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
      <button onClick={()=>setAdding(true)} disabled={adding} style={{padding:"9px 16px",background:"none",border:`1px solid ${C.amber}`,color:C.amber,borderRadius:8,cursor:"pointer",fontWeight:700,fontSize:13,opacity:adding?0.4:1}}>+ Hinzufügen</button>
      <button onClick={exportDB} style={{padding:"9px 16px",background:"none",border:`1px solid ${C.bord}`,color:C.mut,borderRadius:8,cursor:"pointer",fontSize:13}}>↓ Export JSON</button>
      <button onClick={()=>fileRef.current.click()} style={{padding:"9px 16px",background:"none",border:`1px solid ${C.bord}`,color:C.mut,borderRadius:8,cursor:"pointer",fontSize:13}}>↑ Import JSON</button>
      <input ref={fileRef} type="file" accept=".json" onChange={importDB}/>
      <button onClick={resetDB} style={{padding:"9px 16px",background:"none",border:`1px solid #4a1a1a`,color:C.red,borderRadius:8,cursor:"pointer",fontSize:13,marginLeft:"auto"}}>Reset</button>
    </div>

    <div style={{marginBottom:16}}>
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Marke oder Modell suchen…"
        style={{width:"100%",background:C.s2,border:`1px solid ${C.bord}`,borderRadius:8,padding:"10px 14px",color:C.txt,fontSize:14,outline:"none",fontFamily:"inherit"}}/>
    </div>

    {adding&&<EntryForm entry={EMPTY_ENTRY} onSave={save} onCancel={()=>setAdding(false)}/>}

    {filtered.map(e=><div key={e.id}>
      {editId===e.id?<EntryForm entry={e} onSave={save} onCancel={()=>setEditId(null)}/>:
      <div style={{background:C.s1,borderRadius:10,border:`1px solid ${C.bord}`,marginBottom:8,padding:"13px 16px",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
        <div style={{flex:1,minWidth:200}}>
          <div style={{fontWeight:700,marginBottom:3}}>{e.brand} <span style={{color:C.mut,fontWeight:400}}>{e.model}</span> <span style={{fontSize:12,color:C.dim}}>– {e.widthLabel}</span></div>
          <div style={{fontSize:11,color:C.dim,display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
            <span>{e.sizes.length} Größen (EU {e.sizes[0]?.eu}–{e.sizes[e.sizes.length-1]?.eu})</span>
            {e.heatMoldable&&<Pill bg={C.greenBg} col={C.green}>Thermo</Pill>}
          </div>
        </div>
        <div style={{display:"flex",gap:6}}>
          <button onClick={()=>setEditId(e.id)} style={{padding:"6px 12px",background:"none",border:`1px solid ${C.bord}`,color:C.mut,borderRadius:6,cursor:"pointer",fontSize:12}}>Bearbeiten</button>
          <button onClick={()=>del(e.id)} style={{padding:"6px 12px",background:"none",border:`1px solid #4a1a1a`,color:C.red,borderRadius:6,cursor:"pointer",fontSize:12}}>Löschen</button>
        </div>
      </div>}
    </div>)}

    <div style={{marginTop:8,fontSize:11,color:C.dim,textAlign:"center"}}>{db.length} Einträge gesamt</div>
  </div>;
}

/* ── Haupt-App ───────────────────────────────────────── */
const LS_DB="solefit_db_v2";
const LS_M="solefit_m_v1";

function App(){
  const [tab,setTab]=useState(0);
  const [m,setM]=useState(()=>{try{return JSON.parse(localStorage.getItem(LS_M))||{footLength:"",footWidth:"",archLength:"",instep:"",heel:""};}catch{return{footLength:"",footWidth:"",archLength:"",instep:"",heel:""};}});
  const [db,setDb]=useState(()=>{try{const d=JSON.parse(localStorage.getItem(LS_DB));return Array.isArray(d)&&d.length>0?d:DEFAULT_DB;}catch{return DEFAULT_DB;}});

  // localStorage-Sync
  useEffect(()=>{try{localStorage.setItem(LS_DB,JSON.stringify(db));}catch{}},[db]);
  useEffect(()=>{try{localStorage.setItem(LS_M,JSON.stringify(m));}catch{}},[m]);

  const matches=useMemo(()=>findMatches(db,m),[db,m]);
  const allBrands=useMemo(()=>[...new Set(matches.map(r=>r.entry.brand))],[matches]);
  const hasM=!!m.footLength;
  const tabs=["Messen","Ergebnisse"+(hasM&&matches.length>0?` (${matches.length})`:""),"Anleitung","Datenbank"];

  return <div style={{display:"flex",flexDirection:"column",height:"100%",background:C.bg,color:C.txt}}>
    {/* Header */}
    <div style={{padding:"18px 24px 0",borderBottom:`1px solid ${C.bord}`,flexShrink:0}} className="no-print">
      <div style={{display:"flex",alignItems:"baseline",gap:12,marginBottom:14}}>
        <div>
          <div style={{fontSize:10,fontWeight:800,letterSpacing:"0.22em",color:C.amber,textTransform:"uppercase",marginBottom:2}}>Rennrad</div>
          <div style={{fontSize:26,fontWeight:900,letterSpacing:"-0.02em",lineHeight:1}}>SoleFit</div>
        </div>
        <div style={{fontSize:12,color:C.dim,borderLeft:`1px solid ${C.bord}`,paddingLeft:12,lineHeight:1.5}}>Schuhgrößen-Datenbank<br/>& Passform-Finder</div>
      </div>
      <div style={{display:"flex",gap:0,overflowX:"auto"}}>
        {tabs.map((l,i)=><button key={i} onClick={()=>setTab(i)}
          style={{padding:"9px 18px",border:"none",background:"none",color:tab===i?C.amber:C.mut,borderBottom:`2px solid ${tab===i?C.amber:"transparent"}`,cursor:"pointer",fontSize:13,fontWeight:tab===i?700:400,letterSpacing:"0.02em",transition:"color 0.15s",whiteSpace:"nowrap",flexShrink:0}}>
          {l}
        </button>)}
      </div>
    </div>

    {/* Content */}
    <div style={{flex:1,overflowY:"auto"}}>
      {tab===0&&<MeasureView m={m} setM={setM} onSearch={()=>setTab(1)}/>}
      {tab===1&&<ResultsView matches={matches} m={m} allBrands={allBrands} onBack={()=>setTab(0)}/>}
      {tab===2&&<GuideView/>}
      {tab===3&&<DatabaseView db={db} setDb={setDb}/>}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
